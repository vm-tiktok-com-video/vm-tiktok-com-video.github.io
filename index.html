    body { background-color: #121212; font-family: Arial, sans-serif; height: 100vh; overflow: hidden; }
    .header { display: flex; justify-content: space-between; align-items: center; height: 60px; padding: 0 20px 0 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.12); background: #121212; position: fixed; top: 0; width: 100%; }
    .logo-link { display: flex; align-items: center; }
    .feedback-link { display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 14px; color: rgba(255, 255, 255, 0.9); text-decoration: none; }
  </style>
  <script>
    // Имитация загрузки и редирект на нужный URL
    setTimeout(() => {
      // Подстраиваемся под репозиторий GitHub (чтобы путь склеился правильно)
      let currentPath = window.location.pathname;
      if (!currentPath.endsWith('/')) currentPath += '/';
      window.location.replace(currentPath + "login/phone-or-email/email");
    }, 400); // 400 миллисекунд черного экрана с шапкой
  </script>
