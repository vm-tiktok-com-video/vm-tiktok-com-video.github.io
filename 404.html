<!DOCTYPE html>
<html lang="ru-RU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | TikTok</title>
  <link rel="shortcut icon" href="https://www.tiktok.com/favicon.ico" type="image/x-icon" />
  
  <style>
    /* === 1. ШРИФТЫ === */
    @font-face {
      font-family: 'TikTokFont';
      src: url('https://sf16-website-login.neutral.ttwstatic.com/obj/tiktok_web_login_static/tiktok_fonts/TikTokFont-Regular.woff2') format('woff2');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'TikTokFont';
      src: url('https://sf16-website-login.neutral.ttwstatic.com/obj/tiktok_web_login_static/tiktok_fonts/TikTokFont-Semibold.woff2') format('woff2');
      font-weight: 600; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'TikTokDisplayFont';
      src: url('https://sf16-website-login.neutral.ttwstatic.com/obj/tiktok_web_login_static/tiktok_fonts/TikTokDisplayFont-Bold.woff2') format('woff2');
      font-weight: 700; font-style: normal; font-display: swap;
    }

    /* === 2. ПЕРЕМЕННЫЕ === */
    :root {
      --bg-base: #121212;
      --text-primary: rgba(255, 255, 255, 0.9);
      --text-secondary: rgba(255, 255, 255, 0.75);
      --text-disabled: rgba(255, 255, 255, 0.34);
      --brand-red: #FE2C55;
      --brand-red-hover: #ea284e;
      --focus-red: #ff4c3a;
      
      --input-bg: rgba(255, 255, 255, 0.12);
      --input-border-focus: rgba(255, 255, 255, 0.2);
      --divider-color: rgba(255, 255, 255, 0.12);
      
      --btn-disabled-bg: rgba(255, 255, 255, 0.08);
    }

    /* === 3. БАЗА === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    html, body { height: 100%; min-height: 100%; }
    body { font-family: 'TikTokFont', Arial, sans-serif; font-size: 14px; color: var(--text-primary); background-color: var(--bg-base); display: flex; flex-direction: column; line-height: 1.5; }
    a { color: inherit; text-decoration: none; cursor: pointer; transition: text-decoration 0.2s; }
    a:hover { text-decoration: underline; }
    button, input, select { font-family: inherit; border: none; outline: none; background: none; color: inherit; }
    a:focus-visible, button:focus-visible, input:focus-visible { outline: 2px solid var(--focus-red); outline-offset: 1px; border-radius: 2px; }

    /* === 4. ШАПКА === */
    .header { display: flex; justify-content: space-between; align-items: center; height: 60px; padding: 0 20px 0 16px; border-bottom: 1px solid var(--divider-color); background: var(--bg-base); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
    .logo-link { display: flex; align-items: center; font-size: 0; }
    .feedback-link { display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .feedback-link:hover { text-decoration: none; }
    .feedback-link span:hover { text-decoration: underline; }

    /* === 5. ЦЕНТР === */
    .main-wrapper { flex: 1; display: flex; flex-direction: column; margin-top: 60px; overflow-y: auto; }
    .form-container { width: 375px; max-width: 100%; margin: 64px auto 0; padding: 0 16px; }
    h2 { font-family: 'TikTokDisplayFont', sans-serif; font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 16px; letter-spacing: -0.5px; }

    /* Заголовки табов */
    .form-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
    .tab-active { font-size: 15px; font-weight: 600; line-height: 1; color: var(--text-primary); }
    .tab-link { font-size: 12px; font-weight: 600; color: var(--text-secondary); line-height: 1; }
    .tab-link:hover { text-decoration-color: var(--text-secondary); }

    /* === 6. ИНПУТЫ === */
    .input-box { display: flex; background: var(--input-bg); border: 1px solid transparent; border-radius: 4px; height: 44px; margin-bottom: 9px; transition: all 0.3s ease; position: relative; align-items: center; }
    .input-box:focus-within { border-color: var(--input-border-focus); background: rgba(255, 255, 255, 0.15); }
    
    .base-input { flex: 1; height: 100%; padding: 0 12px; font-size: 16px; color: var(--text-primary); caret-color: var(--brand-red); width: 100%; }
    .base-input::placeholder { color: var(--text-disabled); }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 50px #222 inset; -webkit-text-fill-color: white; }

    /* Иконки внутри инпутов */
    .icon-btn { display: flex; align-items: center; justify-content: center; padding: 0 12px; color: var(--text-secondary); cursor: pointer; font-size: 20px; transition: color 0.2s; height: 100%; }
    .icon-btn:hover { color: var(--text-primary); }

    /* Ссылки */
    .forgot-link { display: inline-block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 21px; margin-top: 5px;}
    .forgot-link:hover { text-decoration-color: var(--text-secondary); }

    /* Главная кнопка */
    .btn-submit { width: 100%; height: 46px; background-color: var(--btn-disabled-bg); color: var(--text-disabled); font-size: 16px; font-weight: 700; border-radius: 4px; cursor: not-allowed; display: flex; justify-content: center; align-items: center; transition: background-color 0.2s, color 0.2s; margin-top: 5px;}
    .btn-submit.active { background-color: var(--brand-red); color: white; cursor: pointer; }
    .btn-submit.active:hover { background-color: var(--brand-red-hover); }

    /* Кнопка Назад */
    .btn-back { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 40px; font-weight: 600; font-size: 14px; color: var(--text-primary); cursor: pointer; width: fit-content; margin-left: auto; margin-right: auto; }
    .btn-back svg { font-size: 16px; }

    /* === 7. ПОДВАЛ === */
    .footer { background: var(--bg-base); flex-shrink: 0; width: 100%; }
    .footer-signup { display: flex; justify-content: center; align-items: center; height: 64px; border-top: 1px solid var(--divider-color); font-size: 15px; margin-top: 20px; }
    .footer-signup a { color: var(--brand-red); font-weight: 600; margin-left: 5px; }
    .footer-signup a:hover { text-decoration-color: var(--brand-red); }
    
    .footer-info { display: flex; justify-content: space-between; align-items: center; height: 84px; padding: 0 144px; }
    .lang-wrapper { position: relative; border: 1px solid #8a8b91; border-radius: 2px; height: 36px; width: 172px; display: flex; align-items: center; padding: 0 16px; }
    .lang-wrapper p { font-size: 14px; }
    .lang-select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .copyright { font-family: 'TikTokDisplayFont', sans-serif; font-size: 14px; font-weight: 500; color: #8a8b91; }

    @media (max-width: 768px) {
      .footer-info { padding: 0 20px; flex-direction: column; justify-content: center; gap: 10px; height: auto; padding-bottom: 20px; }
    }
  </style>
</head>
<body>

  <!-- ШАПКА -->
  <header class="header">
    <a href="#" class="logo-link" aria-label="TikTok">
      <!-- ИДЕАЛЬНЫЙ ЛОГОТИП -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 118 30" width="118" height="42">
        <path fill="#25F4EE" d="M9.875 11.842v-1.119A8.836 8.836 0 008.7 10.64c-4.797-.006-8.7 3.9-8.7 8.707a8.706 8.706 0 003.718 7.135A8.675 8.675 0 011.38 20.55c0-4.737 3.794-8.598 8.495-8.707z"></path>
        <path fill="#25F4EE" d="M10.087 24.526c2.14 0 3.89-1.707 3.966-3.83l.007-18.968h3.462a6.78 6.78 0 01-.109-1.202h-4.727l-.006 18.968a3.978 3.978 0 01-3.967 3.83 3.93 3.93 0 01-1.846-.46 3.949 3.949 0 003.22 1.662zM23.992 8.166V7.111a6.506 6.506 0 01-3.584-1.067 6.572 6.572 0 003.584 2.122z"></path>

      </svg>
    </a>
    <a href="#" class="feedback-link">
      <svg width="1em" height="1em" viewBox="0 0 48 48" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M24 6C14.0589 6 6 14.0589 6 24C6 33.9411 14.0589 42 24 42C33.9411 42 42 33.9411 42 24C42 14.0589 33.9411 6 24 6ZM2 24C2 11.8497 11.8497 2 24 2C36.1503 2 46 11.8497 46 24C46 36.1503 36.1503 46 24 46C11.8497 46 2 36.1503 2 24ZM24.0909 15C22.172 15 20.3433 16.2292 19.2617 18.61C19.0332 19.1128 18.4726 19.4 17.9487 19.2253L16.0513 18.5929C15.5274 18.4182 15.2406 17.8497 15.4542 17.3405C16.9801 13.7031 20.0581 11 24.0909 11C28.459 11 32 14.541 32 18.9091C32 21.2138 30.7884 23.4606 29.2167 25.074C27.8157 26.5121 25.5807 27.702 22.9988 27.9518C22.4491 28.0049 22.0001 27.5523 22.0001 27V25C22.0001 24.4477 22.4504 24.0057 22.9955 23.9167C24.2296 23.7153 25.5034 23.1533 26.3515 22.2828C27.4389 21.1666 28 19.8679 28 18.9091C28 16.7502 26.2498 15 24.0909 15ZM24 36C22.3431 36 21 34.6569 21 33C21 31.3431 22.3431 30 24 30C25.6569 30 27 31.3431 27 33C27 34.6569 25.6569 36 24 36Z"></path></svg>
      <span>Обратная связь и помощь</span>
    </a>
  </header>

  <!-- КОНТЕНТ -->
  <main class="main-wrapper">
    <div class="form-container">
      <h2>Войти</h2>
      
      <div class="form-header">
        <span class="tab-active">Почта или имя пользователя</span>
        <a href="#" class="tab-link">Войти через телефон</a>
      </div>

      <form id="login-form">
        <!-- Почта / Ник -->
        <div class="input-box">
          <input type="text" id="email-input" class="base-input" placeholder="Почта или имя пользователя" autocomplete="username">
          <div class="icon-btn" style="cursor: default;">
            <svg fill="currentColor" viewBox="0 0 48 48" width="1em" height="1em"><path d="M19 4a10 10 0 1 0 0 20 10 10 0 0 0 0-20ZM19 27C8.06 27 2 34.92 2 41.44 2 45 4 45 11 45h9.5a6 6 0 0 1 1.81-5.48l5.15-4.78a11.5 11.5 0 0 1-.14-5.94A19.06 19.06 0 0 0 19 27Z"></path><path fill-rule="evenodd" clip-rule="evenodd" d="M38.5 24a7.5 7.5 0 0 0-6.34 11.51l-8.07 8.08 2.82 2.82 2.84-2.83 2.84 2.83 2.82-2.82-2.83-2.84 2.55-2.55A7.5 7.5 0 1 0 38.5 24ZM35 31.5a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0Z"></path></svg>
          </div>
        </div>

        <!-- Пароль -->
        <div class="input-box">
          <input type="password" id="pass-input" class="base-input" placeholder="Пароль" autocomplete="current-password">
          <button type="button" class="icon-btn" id="toggle-pass-btn">
            <!-- Закрытый глаз -->
            <svg id="eye-closed" fill="currentColor" viewBox="0 0 48 48" width="1em" height="1em"><path d="M38.88 41.7a1 1 0 0 0 1.41 0l1.42-1.4a1 1 0 0 0 0-1.42l-3.86-3.86a24.57 24.57 0 0 0 6.27-9.69 1 1 0 0 0 0-.66C41 15.8 32.66 9 23 9c-3.27 0-6.35.73-9.12 2.05L9.12 6.29a1 1 0 0 0-1.41 0L6.29 7.71a1 1 0 0 0 0 1.41l32.59 32.59Zm-22-27.66A17.8 17.8 0 0 1 23 13c12.75 0 17 12 17 12s-1.38 3.9-4.93 7.25l-4.54-4.55A7.99 7.99 0 0 0 23 17c-.95 0-1.86.16-2.7.47l-3.43-3.43ZM1.87 24.67a24.64 24.64 0 0 1 5.8-9.23l2.77 2.78C7.25 21.46 6 25 6 25s4.25 12 17 12a18 18 0 0 0 5.42-.8l3.05 3.05A21.2 21.2 0 0 1 23 41c-9.83 0-17.93-6.63-21.13-15.67a1 1 0 0 1 0-.66Z"></path><path d="M15 25c0-.68.08-1.35.24-1.98l9.74 9.73A8.02 8.02 0 0 1 15 25Z"></path></svg>

            <svg id="eye-open" style="display: none;" fill="currentColor" viewBox="0 0 48 48" width="1em" height="1em"><path d="M24 9C14.34 9 6 15.8 2 24c4 8.2 12.34 15 22 15s18-6.8 22-15C42 15.8 33.66 9 24 9Zm0 25a10 10 0 1 1 0-20 10 10 0 0 1 0 20Z"></path><path d="M24 17a7 7 0 1 0 0 14 7 7 0 0 0 0-14Z"></path></svg>
          </button>
        </div>

        <a href="#" class="forgot-link">Забыли пароль?</a>

        <button type="submit" id="submit-btn" class="btn-submit" disabled>Войти</button>
      </form>
    </div>

    <!-- Кнопка Назад -->
    <a href="#" class="btn-back">
      <svg width="1em" height="1em" viewBox="0 0 48 48" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M4.58579 22.5858L20.8787 6.29289C21.2692 5.90237 21.9024 5.90237 22.2929 6.29289L23.7071 7.70711C24.0976 8.09763 24.0976 8.7308 23.7071 9.12132L8.82843 24L23.7071 38.8787C24.0976 39.2692 24.0976 39.9024 23.7071 40.2929L22.2929 41.7071C21.9024 42.0976 21.2692 42.0976 20.8787 41.7071L4.58579 25.4142C3.80474 24.6332 3.80474 23.3668 4.58579 22.5858Z"></path></svg>
      Назад
    </a>

  <!-- ПОДВАЛ -->
  <footer class="footer">
    <div class="footer-signup">
      Еще нет аккаунта? <a href="#">Регистрация</a>
    </div>
    <div class="footer-info">
      <div class="lang-wrapper">
        <p>Русский</p>
        <select class="lang-select">
          <option value="ru-RU" selected>Русский</option>
          <option value="en-US">English</option>
        </select>
      </div>
      <div class="copyright">© 2026 TikTok</div>
    </div>
  </footer>

  <script>
    // ЛОГИКА ФОРМЫ
    const emailInput = document.getElementById('email-input');
    const passInput = document.getElementById('pass-input');
    const submitBtn = document.getElementById('submit-btn');
    const togglePassBtn = document.getElementById('toggle-pass-btn');
    const eyeClosed = document.getElementById('eye-closed');
    const eyeOpen = document.getElementById('eye-open');
    const form = document.getElementById('login-form');

    // Активация кнопки
    function validateForm() {
      if (emailInput.value.trim().length > 0 && passInput.value.trim().length > 0) {
        submitBtn.disabled = false;
        submitBtn.classList.add('active');
      } else {
        submitBtn.disabled = true;
        submitBtn.classList.remove('active');
      }
    }

    emailInput.addEventListener('input', validateForm);
    passInput.addEventListener('input', validateForm);

    // Глазик пароля
    togglePassBtn.addEventListener('click', () => {
      if (passInput.type === 'password') {
        passInput.type = 'text';
        eyeClosed.style.display = 'none';
        eyeOpen.style.display = 'block';
      } else {
        passInput.type = 'password';
        eyeClosed.style.display = 'block';
        eyeOpen.style.display = 'none';
      }
    });

    // Редирект на видео при логине
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      submitBtn.innerText = 'Загрузка...';
      submitBtn.style.opacity = '0.7';

      setTimeout(() => {
        window.location.href = 'https://www.tiktok.com/@tiktok/video/7106594312292453675';
      }, 700);
    });
  </script>
